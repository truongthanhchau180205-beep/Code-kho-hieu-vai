<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - TechStore</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* Login Page Specific Styles */
        .login-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            max-width: 900px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 600px;
        }

        .login-visual {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            padding: 40px;
        }

        .login-visual h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .login-visual p {
            font-size: 1.1rem;
            text-align: center;
            opacity: 0.9;
            line-height: 1.6;
        }

        .login-visual .icon {
            font-size: 4rem;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .login-form-container {
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header h1 {
            font-size: 2rem;
            color: #1a1a1a;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #666;
            font-size: 1rem;
        }

        .login-form {
            width: 100%;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group .input-icon {
            position: absolute;
            right: 15px;
            top: 45px;
            color: #999;
            pointer-events: none;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 45px;
            color: #999;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .password-toggle:hover {
            color: #667eea;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .remember-me input[type="checkbox"] {
            width: auto;
            margin: 0;
        }

        .forgot-password {
            color: #667eea;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .forgot-password:hover {
            color: #5a6fd8;
        }

        .submit-login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .submit-login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .submit-login-btn:active {
            transform: translateY(0);
        }

        .divider {
            text-align: center;
            margin: 30px 0;
            position: relative;
            color: #999;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e1e5e9;
        }

        .divider span {
            background: white;
            padding: 0 20px;
        }

        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .social-btn {
            padding: 12px;
            border: 2px solid #e1e5e9;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            color: #666;
            font-weight: 500;
        }

        .social-btn:hover {
            border-color: #667eea;
            color: #667eea;
            transform: translateY(-2px);
        }

        .register-link {
            text-align: center;
            color: #666;
        }

        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            color: #5a6fd8;
        }

        .back-home {
            position: absolute;
            top: 30px;
            left: 30px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
        }

        .back-home:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(-5px);
            color: white;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-container {
                grid-template-columns: 1fr;
                max-width: 400px;
                margin: 20px;
            }

            .login-visual {
                padding: 30px 20px;
                min-height: 200px;
            }

            .login-visual h2 {
                font-size: 1.8rem;
            }

            .login-form-container {
                padding: 40px 30px;
            }

            .social-login {
                grid-template-columns: 1fr;
            }

            .back-home {
                position: static;
                margin-bottom: 20px;
                align-self: flex-start;
            }
        }

        /* Error message styles */
        .error-message {
            color: #e74c3c;
            font-size: 0.9rem;
            margin-top: 5px;
            display: none;
        }

        .form-group.error input {
            border-color: #e74c3c;
            background: #fdf2f2;
        }

        .form-group.error .error-message {
            display: block;
        }

        /* Loading state */
        .submit-login-btn.loading {
            color: transparent;
        }

        .submit-login-btn.loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-page">
        <a href="index.html" class="back-home">
            <i class="fas fa-arrow-left"></i>
            Về trang chủ
        </a>

        <div class="login-container">
            <!-- Visual Side -->
            <div class="login-visual">
                <i class="fas fa-mobile-alt icon"></i>
                <h2>TechStore</h2>
                <p>Chào mừng bạn trở lại! Đăng nhập để trải nghiệm những sản phẩm điện thoại tốt nhất và nhận được ưu đãi độc quyền.</p>
            </div>

            <!-- Form Side -->
            <div class="login-form-container">
                <div class="login-header">
                    <h1>Đăng nhập</h1>
                    <p>Vui lòng nhập thông tin của bạn</p>
                </div>

                <form class="login-form" id="loginForm" onsubmit="return handleLogin(event)">
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" name="email" placeholder="Nhập email của bạn" required>
                        <i class="fas fa-envelope input-icon"></i>
                        <div class="error-message" id="emailError"></div>
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">Mật khẩu</label>
                        <input type="password" id="loginPassword" name="password" placeholder="Nhập mật khẩu" required>
                        <i class="fas fa-eye password-toggle" onclick="togglePassword()" id="passwordToggle"></i>
                        <div class="error-message" id="passwordError"></div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="rememberMe">
                            <span>Ghi nhớ tôi</span>
                        </label>
                        <a href="#" class="forgot-password" onclick="forgotPassword()">Quên mật khẩu?</a>
                    </div>

                    <button type="submit" class="submit-login-btn" id="loginButton">
                        Đăng nhập
                    </button>
                </form>

                <div class="divider">
                    <span>Hoặc đăng nhập với</span>
                </div>

                <div class="social-login">
                    <a href="#" class="social-btn" onclick="loginWithGoogle()">
                        <i class="fab fa-google"></i>
                        Google
                    </a>
                    <a href="#" class="social-btn" onclick="loginWithFacebook()">
                        <i class="fab fa-facebook-f"></i>
                        Facebook
                    </a>
                </div>

                <div class="register-link">
                    Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/validation.js"></script>
    <script src="js/auth-simple.js"></script>
    <script>
        // Check if user is already logged in
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, checking auth...');
            setTimeout(() => {
                if (window.TechStoreAuth && window.TechStoreAuth.isLoggedIn()) {
                    console.log('User already logged in, redirecting...');
                    window.location.href = 'index.html';
                }
            }, 100);
        });

        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('loginPassword');
            const passwordToggle = document.getElementById('passwordToggle');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordToggle.classList.remove('fa-eye');
                passwordToggle.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                passwordToggle.classList.remove('fa-eye-slash');
                passwordToggle.classList.add('fa-eye');
            }
        }

        // Handle login form submission
        function handleLogin(event) {
            event.preventDefault();
            
            // Clear previous errors
            clearErrors();
            
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            // Basic validation
            let hasError = false;
            
            if (!email) {
                showError('loginEmail', 'Vui lòng nhập email');
                hasError = true;
            }
            
            if (!password) {
                showError('loginPassword', 'Vui lòng nhập mật khẩu');
                hasError = true;
            }
            
            if (hasError) {
                return false;
            }
            
            // Show loading state
            const submitBtn = document.getElementById('loginButton');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang đăng nhập...';
            submitBtn.disabled = true;
            
            // Attempt login using auth system
            setTimeout(() => {
                console.log('Trying to login with:', email, password);
                
                if (!window.TechStoreAuth) {
                    console.error('TechStoreAuth not loaded!');
                    showError('loginPassword', 'Lỗi hệ thống, vui lòng tải lại trang');
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                    return;
                }
                
                const result = window.TechStoreAuth.login(email, password);
                console.log('Login result:', result);
                
                if (result.success) {
                    if (rememberMe) {
                        localStorage.setItem('rememberedEmail', email);
                    } else {
                        localStorage.removeItem('rememberedEmail');
                    }
                    
                    window.location.href = 'index.html';
                } else {
                    showError('loginPassword', result.message);
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            }, 1000);
            
            return false;
        }

        // Validate email format
        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        // Show error message
        function showError(fieldId, message) {
            const field = document.getElementById(fieldId);
            const formGroup = field.parentElement;
            const errorElement = formGroup.querySelector('.error-message');
            
            formGroup.classList.add('error');
            errorElement.textContent = message;
        }

        // Clear all errors
        function clearErrors() {
            const formGroups = document.querySelectorAll('.form-group');
            formGroups.forEach(group => {
                group.classList.remove('error');
                const errorElement = group.querySelector('.error-message');
                if (errorElement) {
                    errorElement.textContent = '';
                }
            });
        }

        // Forgot password function
        function forgotPassword() {
            const email = prompt('Vui lòng nhập email để đặt lại mật khẩu:');
            if (email && isValidEmail(email)) {
                alert('Link đặt lại mật khẩu đã được gửi đến email của bạn!');
            } else if (email) {
                alert('Vui lòng nhập email hợp lệ!');
            }
        }

        // Social login functions
        function loginWithGoogle() {
            alert('Tính năng đăng nhập với Google sẽ sớm có mặt!');
        }

        function loginWithFacebook() {
            alert('Tính năng đăng nhập với Facebook sẽ sớm có mặt!');
        }

        // Load remembered email on page load
        window.addEventListener('load', function() {
            const rememberedEmail = localStorage.getItem('rememberedEmail');
            if (rememberedEmail) {
                document.getElementById('loginEmail').value = rememberedEmail;
                document.getElementById('rememberMe').checked = true;
            }
        });

        // Enhanced form validation with real-time feedback
        document.getElementById('loginEmail').addEventListener('blur', function() {
            const email = this.value.trim();
            const formGroup = this.parentElement;
            
            if (email && !isValidEmail(email)) {
                showError('loginEmail', 'Email không hợp lệ');
            } else {
                formGroup.classList.remove('error');
            }
        });

        document.getElementById('loginPassword').addEventListener('input', function() {
            const password = this.value;
            const formGroup = this.parentElement;
            
            if (password && password.length < 6) {
                showError('loginPassword', 'Mật khẩu phải có ít nhất 6 ký tự');
            } else {
                formGroup.classList.remove('error');
            }
        });

        // Add smooth animations
        window.addEventListener('load', function() {
            const container = document.querySelector('.login-container');
            container.style.opacity = '0';
            container.style.transform = 'translateY(30px)';
            
            setTimeout(() => {
                container.style.transition = 'all 0.6s ease';
                container.style.opacity = '1';
                container.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body>
</html>
