<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Đồng Bộ Hình Ảnh - TechStore</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            padding: 20px;
            background-color: #f8fafc;
            font-family: Arial, sans-serif;
        }
        
        .test-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .test-section {
            margin-bottom: 40px;
            padding: 20px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
        }
        
        .test-section h2 {
            color: #1a1a1a;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .test-image-card {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            background: #f9fafb;
        }
        
        .test-image-card img {
            width: 100%;
            height: 150px;
            object-fit: contain;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            background: white;
        }
        
        .test-image-card h4 {
            margin: 10px 0 5px 0;
            color: #1a1a1a;
            font-size: 14px;
        }
        
        .test-image-card .image-status {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            margin-top: 8px;
        }
        
        .status-loading {
            background: #fef3c7;
            color: #92400e;
        }
        
        .status-success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .status-error {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .test-controls {
            margin-bottom: 20px;
            padding: 15px;
            background: #f0f9ff;
            border-radius: 8px;
        }
        
        .test-controls button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            margin-right: 10px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .test-controls button:hover {
            background: #5a6fd8;
        }
        
        .log-container {
            background: #1f2937;
            color: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        
        .log-entry {
            margin-bottom: 4px;
        }
        
        .log-info { color: #60a5fa; }
        .log-success { color: #34d399; }
        .log-error { color: #f87171; }
        .log-warn { color: #fbbf24; }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🧪 Test Đồng Bộ Hình Ảnh TechStore</h1>
        <p>Trang này để kiểm tra hệ thống đồng bộ hình ảnh giữa trang sản phẩm và giỏ hàng.</p>
        
        <div class="test-controls">
            <button onclick="testImageSync()">🔄 Test Đồng Bộ</button>
            <button onclick="testCartImages()">🛒 Test Hình Ảnh Cart</button>
            <button onclick="testFallbackImages()">🖼️ Test Fallback</button>
            <button onclick="clearLog()">🗑️ Clear Log</button>
            <button onclick="window.location.href='index.html'">🏠 Về Trang Chủ</button>
        </div>
        
        <div class="test-section">
            <h2>📱 Hình Ảnh Sản Phẩm Chính</h2>
            <div class="image-grid" id="mainProductImages">
                <!-- Main product images will be loaded here -->
            </div>
        </div>
        
        <div class="test-section">
            <h2>🔧 Hình Ảnh Phụ Kiện</h2>
            <div class="image-grid" id="accessoryImages">
                <!-- Accessory images will be loaded here -->
            </div>
        </div>
        
        <div class="test-section">
            <h2>🛒 Mô Phỏng Giỏ Hàng</h2>
            <div id="cartSimulation">
                <!-- Cart simulation will be loaded here -->
            </div>
        </div>
        
        <div class="test-section">
            <h2>📋 Log Đồng Bộ</h2>
            <div class="log-container" id="logContainer">
                <!-- Logs will appear here -->
            </div>
        </div>
    </div>

    <script src="js/shared.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/image-manager.js"></script>
    <script>
        // Test data
        const testProducts = {
            'iPhone 14 Pro Max': 'iphone-14-pro-max.png',
            'Samsung Galaxy S23': 'samsung-s23.png',
            'Xiaomi 13 Pro': 'xiaomi.png',
            'Google Pixel 8 Pro': 'google-pixel.png',
            'AirPods Pro 2': 'https://cdn.tgdd.vn/Products/Images/54/289781/airpods-pro-2nd-gen-usb-c-thumb-600x600.jpg',
            'Sạc nhanh 65W GaN': 'https://cdn.tgdd.vn/Products/Images/58/313088/sac-type-c-pd-65w-ugreen-40737-thumb-600x600.jpg'
        };

        // Logging function
        function log(message, type = 'info') {
            const logContainer = document.getElementById('logContainer');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry log-${type}`;
            logEntry.textContent = `[${timestamp}] ${message}`;
            logContainer.appendChild(logEntry);
            logContainer.scrollTop = logContainer.scrollHeight;
            console.log(`[ImageTest] ${message}`);
        }

        function clearLog() {
            document.getElementById('logContainer').innerHTML = '';
        }

        // Create test image card
        function createTestImageCard(productName, imageSrc) {
            const card = document.createElement('div');
            card.className = 'test-image-card';
            card.innerHTML = `
                <img src="${imageSrc}" alt="${productName}" data-product-name="${productName}">
                <h4>${productName}</h4>
                <div class="image-status status-loading">Đang tải...</div>
            `;
            
            const img = card.querySelector('img');
            const status = card.querySelector('.image-status');
            
            img.addEventListener('load', () => {
                status.className = 'image-status status-success';
                status.textContent = 'Thành công';
                log(`✅ Image loaded: ${productName}`, 'success');
            });
            
            img.addEventListener('error', () => {
                status.className = 'image-status status-error';
                status.textContent = 'Lỗi tải';
                log(`❌ Image failed: ${productName}`, 'error');
            });
            
            return card;
        }

        // Load test images
        function loadTestImages() {
            const mainContainer = document.getElementById('mainProductImages');
            const accessoryContainer = document.getElementById('accessoryImages');
            
            // Clear containers
            mainContainer.innerHTML = '';
            accessoryContainer.innerHTML = '';
            
            log('🔄 Loading test images...', 'info');
            
            // Load main products
            const mainProducts = ['iPhone 14 Pro Max', 'Samsung Galaxy S23', 'Xiaomi 13 Pro', 'Google Pixel 8 Pro'];
            mainProducts.forEach(product => {
                const card = createTestImageCard(product, testProducts[product]);
                mainContainer.appendChild(card);
            });
            
            // Load accessories
            const accessories = ['AirPods Pro 2', 'Sạc nhanh 65W GaN'];
            accessories.forEach(product => {
                const card = createTestImageCard(product, testProducts[product]);
                accessoryContainer.appendChild(card);
            });
        }

        // Test image sync
        function testImageSync() {
            log('🔄 Testing image synchronization...', 'info');
            
            if (window.syncProductImages) {
                window.syncProductImages();
                log('✅ Image sync function called', 'success');
            } else {
                log('❌ Image sync function not available', 'error');
            }
            
            if (window.imageManager) {
                window.imageManager.syncImagesInContainer();
                log('✅ ImageManager sync called', 'success');
            } else {
                log('⚠️ ImageManager not available', 'warn');
            }
        }

        // Test cart images
        function testCartImages() {
            log('🛒 Testing cart image simulation...', 'info');
            
            const cartContainer = document.getElementById('cartSimulation');
            cartContainer.innerHTML = '';
            
            // Simulate cart items
            const cartItems = [
                { name: 'iPhone 14 Pro Max', image: testProducts['iPhone 14 Pro Max'], price: 29990000 },
                { name: 'AirPods Pro 2', image: testProducts['AirPods Pro 2'], price: 6990000 }
            ];
            
            cartItems.forEach(item => {
                const cartItem = document.createElement('div');
                cartItem.className = 'cart-item';
                cartItem.style.cssText = `
                    display: flex;
                    align-items: center;
                    gap: 15px;
                    padding: 15px;
                    margin-bottom: 10px;
                    border: 1px solid #e2e8f0;
                    border-radius: 8px;
                    background: white;
                `;
                
                cartItem.innerHTML = `
                    <img src="${item.image}" alt="${item.name}" class="item-image" 
                         style="width: 80px; height: 80px; object-fit: contain; border-radius: 8px;">
                    <div>
                        <h3 style="margin: 0 0 5px 0; font-size: 16px;">${item.name}</h3>
                        <p style="margin: 0; color: #667eea; font-weight: 600;">${item.price.toLocaleString('vi-VN')}₫</p>
                    </div>
                `;
                
                cartContainer.appendChild(cartItem);
            });
            
            log('✅ Cart simulation created', 'success');
            
            // Sync cart images
            if (window.imageManager) {
                window.imageManager.syncImagesInContainer(cartContainer);
                log('✅ Cart images synced', 'success');
            }
        }

        // Test fallback images
        function testFallbackImages() {
            log('🖼️ Testing fallback images...', 'info');
            
            const fallbackContainer = document.createElement('div');
            fallbackContainer.className = 'image-grid';
            
            // Create broken image to test fallback
            const brokenCard = createTestImageCard('Test Fallback', 'broken-image-url.png');
            fallbackContainer.appendChild(brokenCard);
            
            document.getElementById('accessoryImages').appendChild(fallbackContainer);
            
            log('✅ Fallback test created', 'success');
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            log('🚀 Image test page initialized', 'info');
            
            // Load test images
            setTimeout(() => {
                loadTestImages();
            }, 500);
            
            // Check for ImageManager
            setTimeout(() => {
                if (window.imageManager) {
                    log('✅ ImageManager detected and active', 'success');
                } else {
                    log('⚠️ ImageManager not detected', 'warn');
                }
            }, 1000);
        });
    </script>
</body>
</html>
